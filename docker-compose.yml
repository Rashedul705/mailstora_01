services:
  redis:
    image: redis:alpine
    container_name: mailstora_redis
    restart: always
    volumes:
      - redis_data:/data
    expose:
      - "6379"

  server:
    build:
      context: ./Server
      dockerfile: Dockerfile
    container_name: mailstora_server
    restart: always
    ports:
      - "5001:5001"
    depends_on:
      - redis
    volumes:
      - email_templates:/app/public/Email_Template
    environment:
      - PORT=5001
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=${MONGODB_URI}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - IMGBB_API_KEY=${IMGBB_API_KEY}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
      - EMAIL_HOST=${EMAIL_HOST:-smtp.gmail.com}
      - EMAIL_PORT=${EMAIL_PORT:-587}
      - MASTER_OTP=${MASTER_OTP:-333333}
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}

  client:
    build:
      context: ./Client
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: mailstora_client
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      - PORT=3000

volumes:
  redis_data:
  email_templates:
