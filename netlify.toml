# =============================================================
# NETLIFY DEPLOYMENT CONFIG — MailStora
# =============================================================
[build]
  base    = "Client"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION  = "20"
  NPM_FLAGS     = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── API PROXY ───────────────────────────────────────────────
# This allows the frontend to call "/api/*" and have it proxy
# to your backend (e.g. Render). 
# Configure NEXT_PUBLIC_API_URL in Netlify's UI.
[[redirects]]
  from   = "/api/*"
  to     = ":NEXT_PUBLIC_API_URL/api/:splat"
  status = 200
  force  = true

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
