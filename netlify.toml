[build]
  base = "Client"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[redirects]]
  from = "/api/*"
  # Replace with your actual backend URL in the Netlify UI or here
  to = "https://your-backend.onrender.com/api/:splat"
  status = 200
  force = true
