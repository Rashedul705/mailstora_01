# =============================================================
# Render.com — Express Server (render.yaml)
# Drop this file in repo root; Render auto-detects it.
# Docs: https://render.com/docs/infrastructure-as-code
# =============================================================

services:
  - type: web
    name: mailstora-server
    runtime: node
    rootDir: Server
    plan: free                 # upgrade to starter ($7/mo) for always-on
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000            # Render assigns this automatically
      - key: MONGODB_URI
        sync: false             # Set manually in Render dashboard
      - key: REDIS_URL
        sync: false             # Use Render Redis add-on or Upstash
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: IMGBB_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true     # Render auto-generates a secure secret
      - key: MASTER_OTP
        sync: false
      # Add your Netlify frontend URL here after deploying:
      # - key: CLIENT_ORIGIN
      #   value: https://your-site.netlify.app
